<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeTechStroke | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { width: 100%; max-width: 400px; border: none; border-radius: 10px; }
        .btn-custom { background-color: #D81B60; color: white; }
        .btn-custom:hover { background-color: #ad154d; color: white; }
    </style>
</head>
<body>
<div class="card shadow-lg p-4">
    <h3 class="text-center mb-4">🩺 DeTechStroke</h3>

    {% if error %}
    <div class="alert alert-danger text-center p-2">{{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Admin Username</label>
            <input type="text" name="username" class="form-control" placeholder="e.g. dr.juan" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-custom w-100 mt-3">Access Portal</button>
    </form>
</div>
</body>
</html>
